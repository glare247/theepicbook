
# ─────────────────────────────────────────────────────────────────
# Prometheus Configuration
#
# Official docs:
# https://prometheus.io/docs/prometheus/latest/configuration/configuration
#
# Prometheus scrapes metrics from:
# 1. Itself          — prometheus health
# 2. Node Exporter   — VM system metrics (CPU, memory, disk)
# 3. App container   — Node.js application metrics
# 4. cAdvisor        — Docker container metrics
# ─────────────────────────────────────────────────────────────────

global:
  # Scrape metrics every 15 seconds
  scrape_interval: 15s

  # Evaluate alert rules every 15 seconds
  evaluation_interval: 15s

  # Labels added to all metrics from this Prometheus
  external_labels:
    monitor:     cloudopshub
    environment: dev

# ── Alert Rules ───────────────────────────────────────────────────
# Docs: https://prometheus.io/docs/prometheus/latest/configuration/alerting_rules
rule_files:
  - "alert.rules.yml"

# ── Alertmanager Connection ───────────────────────────────────────
# Sends fired alerts to Alertmanager
# Alertmanager routes them to Slack + email
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# ── Scrape Configs ────────────────────────────────────────────────
scrape_configs:

  # ── 1. Prometheus itself ────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  # ── 2. Node Exporter — VM system metrics ────────────────────────
  # CPU, memory, disk, network on the GCE VM
  # Docs: https://github.com/prometheus/node_exporter
  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100
    relabel_configs:
      - source_labels: [__address__]
        target_label:  instance
        replacement:   dev-app-vm

  # ── 3. TheEpicBook App metrics ──────────────────────────────────
  # Node.js app exposes metrics at /metrics
  - job_name: theepicbook-app
    static_configs:
      - targets:
          - app:8080
    # prom-client exposes metrics at /metrics by default
    metrics_path: /metrics
    relabel_configs:
      - source_labels: [__address__]
        target_label:  instance
        replacement:   theepicbook-app

  # ── 4. Nginx metrics ────────────────────────────────────────────
  - job_name: nginx
    static_configs:
      - targets:
          - nginx:80
    metrics_path: /metrics
