
# ─────────────────────────────────────────────────────────────────
# Alertmanager Configuration
#
# Official docs:
# https://prometheus.io/docs/alerting/latest/configuration
#
# Routes fired alerts to:
# - Slack  — #cloudopshub-alerts channel
# - Email  — team email address
#
# Replace the placeholder values with real ones:
# SLACK_WEBHOOK_URL → your Slack incoming webhook URL
# TEAM_EMAIL        → your team email address
# ─────────────────────────────────────────────────────────────────

global:
  # How long to wait before re-sending an alert
  resolve_timeout: 5m

  # Slack webhook — replace with your real URL
  # Docs: https://api.slack.com/messaging/webhooks
  slack_api_url: "YOUR_SLACK_WEBHOOK_URL"

# ── Routing ───────────────────────────────────────────────────────
route:
  # Default receiver for all alerts
  receiver: slack-notifications

  # Group alerts by these labels
  group_by:
    - alertname
    - environment

  # Wait 30 seconds before sending first alert
  group_wait: 30s

  # Wait 5 minutes before sending new group alert
  group_interval: 5m

  # Wait 4 hours before re-sending same alert
  repeat_interval: 4h

  # Route critical alerts to both Slack and email
  routes:
    - match:
        severity: critical
      receiver: slack-and-email
      continue: true

    - match:
        severity: warning
      receiver: slack-notifications

# ── Receivers ─────────────────────────────────────────────────────
receivers:

  # Slack only — for warnings
  - name: slack-notifications
    slack_configs:
      - channel: "#cloudopshub-alerts"
        send_resolved: true
        title: >
          [{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}
        text: >
          *Environment:* {{ .GroupLabels.environment }}
          *Alert:* {{ range .Alerts }}{{ .Annotations.summary }}{{ end }}
          *Description:* {{ range .Alerts }}{{ .Annotations.description }}{{ end }}
        color: >
          {{ if eq .Status "firing" }}danger{{ else }}good{{ end }}

  # Slack + Email — for critical alerts
  - name: slack-and-email
    slack_configs:
      - channel: "#cloudopshub-alerts"
        send_resolved: true
        title: >
          🚨 [CRITICAL] {{ .GroupLabels.alertname }}
        text: >
          *Environment:* {{ .GroupLabels.environment }}
          *Alert:* {{ range .Alerts }}{{ .Annotations.summary }}{{ end }}
          *Description:* {{ range .Alerts }}{{ .Annotations.description }}{{ end }}
        color: danger

    email_configs:
      - to:   "YOUR_TEAM_EMAIL"
        from: "alerts@cloudopshub.com"
        smarthost: smtp.gmail.com:587
        auth_username: "YOUR_GMAIL"
        auth_password: "YOUR_GMAIL_APP_PASSWORD"
        send_resolved: true

# ── Inhibit Rules ─────────────────────────────────────────────────
# Suppress warnings when critical alert is already firing
# Prevents alert spam
inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal:
      - alertname
      - environment
