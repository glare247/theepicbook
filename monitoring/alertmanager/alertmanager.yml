
# ─────────────────────────────────────────────────────────────────
# Alertmanager Configuration
#
# Official docs:
# https://prometheus.io/docs/alerting/latest/configuration
#
# Routes fired alerts to:
# - Slack  — #cloudopshub-alerts channel
# - Email  — team email address (critical alerts only)
#
# Credentials are injected via environment variables at runtime.
# Set these in GitHub Secrets → referenced in docker-compose.yml
# env_file or environment block:
#
#   SLACK_WEBHOOK_URL  — Slack incoming webhook URL
#   ALERTMANAGER_EMAIL_TO   — recipient email
#   ALERTMANAGER_EMAIL_FROM — sender email
#   ALERTMANAGER_SMTP_HOST  — SMTP server (e.g. smtp.gmail.com:587)
#   ALERTMANAGER_SMTP_USER  — SMTP username
#   ALERTMANAGER_SMTP_PASS  — SMTP password / app password
#
# Docs: https://api.slack.com/messaging/webhooks
# ─────────────────────────────────────────────────────────────────

global:
  # How long to wait before re-sending a resolved alert
  resolve_timeout: 5m

  # Slack webhook URL — set via environment variable
  slack_api_url: "$SLACK_WEBHOOK_URL"

  # SMTP config for email alerts
  smtp_smarthost:   "$ALERTMANAGER_SMTP_HOST"
  smtp_from:        "$ALERTMANAGER_EMAIL_FROM"
  smtp_auth_username: "$ALERTMANAGER_SMTP_USER"
  smtp_auth_password: "$ALERTMANAGER_SMTP_PASS"
  smtp_require_tls: true

# ── Routing ───────────────────────────────────────────────────────
route:
  # Default receiver for all alerts
  receiver: slack-notifications

  # Group alerts by these labels
  group_by:
    - alertname
    - environment

  # Wait 30 seconds before sending first alert in a group
  group_wait: 30s

  # Wait 5 minutes before sending new alerts in an existing group
  group_interval: 5m

  # Wait 4 hours before re-sending the same alert
  repeat_interval: 4h

  routes:
    # Critical alerts → Slack + Email
    - match:
        severity: critical
      receiver: slack-and-email
      continue: true

    # Warning alerts → Slack only
    - match:
        severity: warning
      receiver: slack-notifications

# ── Receivers ─────────────────────────────────────────────────────
receivers:

  # Slack only — for warnings
  - name: slack-notifications
    slack_configs:
      - channel: "#cloudopshub-alerts"
        send_resolved: true
        title: >
          [{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}
        text: >
          *Environment:* {{ .GroupLabels.environment }}
          *Alert:* {{ range .Alerts }}{{ .Annotations.summary }}{{ end }}
          *Description:* {{ range .Alerts }}{{ .Annotations.description }}{{ end }}
        color: >
          {{ if eq .Status "firing" }}danger{{ else }}good{{ end }}

  # Slack + Email — for critical alerts
  - name: slack-and-email
    slack_configs:
      - channel: "#cloudopshub-alerts"
        send_resolved: true
        title: >
          [CRITICAL] {{ .GroupLabels.alertname }}
        text: >
          *Environment:* {{ .GroupLabels.environment }}
          *Alert:* {{ range .Alerts }}{{ .Annotations.summary }}{{ end }}
          *Description:* {{ range .Alerts }}{{ .Annotations.description }}{{ end }}
        color: danger

    email_configs:
      - to: "$ALERTMANAGER_EMAIL_TO"
        send_resolved: true

# ── Inhibit Rules ─────────────────────────────────────────────────
# Suppress warnings when a critical alert is already firing
# Prevents duplicate/noisy alerts for the same issue
inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal:
      - alertname
      - environment
