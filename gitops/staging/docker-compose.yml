
# ─────────────────────────────────────────────────────────────────
# GitOps — Staging Environment Docker Compose
# ─────────────────────────────────────────────────────────────────

version: "3.8"

services:

  app:
    image: us-central1-docker.pkg.dev/expandox-project-2/cloudopshub-staging/theepicbook-backend:latest
    container_name: theepicbook-app
    restart: unless-stopped
    env_file:
      - /mnt/stateful_partition/cloudopshub/.env
    environment:
      PORT:     8080
      NODE_ENV: production
    networks:
      - theepicbook-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose",
             "--tries=1", "--spider",
             "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: us-central1-docker.pkg.dev/expandox-project-2/cloudopshub-staging/theepicbook-frontend:latest
    container_name: theepicbook-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      app:
        condition: service_healthy
    networks:
      - theepicbook-network

  prometheus:
    image: prom/prometheus:latest
    container_name: theepicbook-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ../../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ../../monitoring/prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml
      - prometheus_data:/prometheus
    networks:
      - theepicbook-network

  grafana:
    image: grafana/grafana:latest
    container_name: theepicbook-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin123
    volumes:
      - grafana_data:/var/lib/grafana
      - ../../monitoring/grafana/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml
    networks:
      - theepicbook-network

  node-exporter:
    image: prom/node-exporter:latest
    container_name: theepicbook-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    networks:
      - theepicbook-network

  alertmanager:
    image: prom/alertmanager:latest
    container_name: theepicbook-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    env_file:
      - /mnt/stateful_partition/cloudopshub/.env
    volumes:
      - ../../monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    networks:
      - theepicbook-network

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  theepicbook-network:
    driver: bridge
