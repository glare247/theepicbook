
# ─────────────────────────────────────────────────────────────────
# GitOps — Production Environment Docker Compose
#
# CD pipeline updates image tags here on every deploy.
# GitHub Actions SSHes into the VM, runs git pull, then
# docker-compose pull && docker-compose up -d.
#
# Images are pulled from GCP Artifact Registry (cloudopshub repo).
# VM service account authenticates automatically — no keys needed.
# Cross-repo IAM binding grants prod-vm-sa reader access to cloudopshub.
#
# NO MySQL container — prod uses Cloud SQL (private IP).
# DB_HOST, DB_PASSWORD are written to .env by the VM startup script
# from GCP Secret Manager (prod-db-host, prod-db-password).
#
# Cloud Logging: containers use the gcplogs log driver.
# Logs appear in GCP Cloud Logging under the container name.
# VM SA has roles/logging.logWriter — no extra auth needed.
# ─────────────────────────────────────────────────────────────────

version: "3.8"

services:

  # ── Node.js Application ─────────────────────────────────────────
  # DB_HOST, DB_USER, DB_PASSWORD, DB_NAME loaded from .env
  # written by the CD deploy script from Secret Manager credentials.
  # Image tag updated by CI pipeline on every push.
  app:
    image: us-central1-docker.pkg.dev/expandox-project-2/cloudopshub/theepicbook-backend:latest
    container_name: theepicbook-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT:     8080
      NODE_ENV: production
    logging:
      driver: gcplogs
      options:
        gcp-log-cmd: "true"
        labels: "container_name,environment"
        env: "NODE_ENV"
        tag: "theepicbook-app"
    networks:
      - theepicbook-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose",
             "--tries=1", "--spider",
             "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Nginx Reverse Proxy ─────────────────────────────────────────
  nginx:
    image: us-central1-docker.pkg.dev/expandox-project-2/cloudopshub/theepicbook-frontend:latest
    container_name: theepicbook-nginx
    restart: unless-stopped
    logging:
      driver: gcplogs
      options:
        gcp-log-cmd: "true"
        tag: "theepicbook-nginx"
    ports:
      - "80:80"
    depends_on:
      app:
        condition: service_healthy
    networks:
      - theepicbook-network

  # ── Prometheus ──────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: theepicbook-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ../../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ../../monitoring/prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml
      - prometheus_data:/prometheus
    networks:
      - theepicbook-network

  # ── Grafana ─────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: theepicbook-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    # GF_SECURITY_ADMIN_PASSWORD injected at deploy time from Secret Manager (prod-grafana-admin-password)
    volumes:
      - grafana_data:/var/lib/grafana
      - ../../monitoring/grafana/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml
      - ../../monitoring/grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
      - ../../monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - theepicbook-network

  # ── Node Exporter ───────────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: theepicbook-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    networks:
      - theepicbook-network

  # ── cAdvisor — Docker container metrics ─────────────────────────
  # Exposes per-container CPU, memory, network metrics to Prometheus
  # Docs: https://github.com/google/cadvisor
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: theepicbook-cadvisor
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - theepicbook-network

  # ── Alertmanager ────────────────────────────────────────────────
  # Credentials injected from .env file (written by CD deploy script
  # from GCP Secret Manager). alertmanager.yml uses $VAR substitution.
  alertmanager:
    image: prom/alertmanager:latest
    container_name: theepicbook-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    env_file:
      - .env
    volumes:
      - ../../monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    networks:
      - theepicbook-network

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  theepicbook-network:
    driver: bridge
