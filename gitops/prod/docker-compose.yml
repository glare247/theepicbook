
# ─────────────────────────────────────────────────────────────────
# GitOps — Production Environment Docker Compose
# ─────────────────────────────────────────────────────────────────

version: "3.8"

services:

  mysql:
    image: us-central1-docker.pkg.dev/expandox-project-2/cloudopshub-prod/theepicbook-mysql:latest
    container_name: theepicbook-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: demo1234
      MYSQL_DATABASE:      bookstore
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - theepicbook-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping",
             "-h", "localhost",
             "-u", "root",
             "-pdemo1234"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  app:
    image: us-central1-docker.pkg.dev/expandox-project-2/cloudopshub-prod/theepicbook-backend:latest
    container_name: theepicbook-app
    restart: unless-stopped
    environment:
      PORT:        8080
      NODE_ENV:    production
      DB_HOST:     mysql
      DB_USER:     root
      DB_PASSWORD: demo1234
      DB_NAME:     bookstore
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - theepicbook-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose",
             "--tries=1", "--spider",
             "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: us-central1-docker.pkg.dev/expandox-project-2/cloudopshub-prod/theepicbook-frontend:latest
    container_name: theepicbook-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      app:
        condition: service_healthy
    networks:
      - theepicbook-network

  prometheus:
    image: prom/prometheus:latest
    container_name: theepicbook-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alert.rules.yml:/etc/prometheus/alert.rules.yml
      - prometheus_data:/prometheus
    networks:
      - theepicbook-network

  grafana:
    image: grafana/grafana:latest
    container_name: theepicbook-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin123
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml
    networks:
      - theepicbook-network

  node-exporter:
    image: prom/node-exporter:latest
    container_name: theepicbook-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    networks:
      - theepicbook-network

  alertmanager:
    image: prom/alertmanager:latest
    container_name: theepicbook-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    networks:
      - theepicbook-network

volumes:
  mysql_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  theepicbook-network:
    driver: bridge
