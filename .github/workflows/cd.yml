              echo '=== Step 11: Deploy Grafana ==='
              sudo docker volume create grafana_data 2>/dev/null || true
              sudo docker stop theepicbook-grafana 2>/dev/null || true
              sudo docker rm   theepicbook-grafana 2>/dev/null || true
              sudo docker run -d \
                --name theepicbook-grafana \
