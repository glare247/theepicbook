
# ─────────────────────────────────────────────────────────────────
# CD PIPELINE — GitHub Actions
#
# Official docs:
# https://docs.github.com/en/actions
#
# Triggers after CI pipeline completes successfully
#
# Pipeline stages:
# 1. Check CI      — only proceed if CI passed
# 2. Update GitOps — update image tags in gitops/dev/docker-compose.yml
# 3. Deploy        — SSH into GCP VM via Cloud IAP and restart containers
#
# Deployment flow:
# CI pushes images → CD updates gitops/dev/docker-compose.yml
# → SSH into VM → git pull → docker compose pull → docker compose up -d
# ─────────────────────────────────────────────────────────────────

name: CD Pipeline

on:
  # Deployment is now handled by the deploy job in ci.yml.
  # This workflow is kept for manual re-deploys only.
  workflow_dispatch:

env:
  PROJECT_ID:    expandox-project-2
  REGION:        us-central1
  REPOSITORY_ID: cloudopshub
  VM_NAME:       dev-app-vm
  VM_ZONE:       us-central1-a

  # Image names
  BACKEND_IMAGE:  theepicbook-backend
  FRONTEND_IMAGE: theepicbook-frontend

jobs:

  # ── JOB 1: Only run if CI passed ────────────────────────────────
  check-ci:
    name: Check CI Status
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: CI passed — proceeding with CD
        run: echo "CI pipeline passed — starting CD pipeline"

  # ── JOB 2: Update GitOps Manifests ──────────────────────────────
  update-gitops:
    name: Update GitOps Manifests
    runs-on: ubuntu-latest
    needs: check-ci

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # Get the commit SHA — from workflow_run event or current SHA for dispatched runs
      - name: Get commit SHA
        id: sha
        run: |
          SHA="${{ github.event.workflow_run.head_sha }}"
          if [ -z "$SHA" ]; then
            SHA="${{ github.sha }}"
          fi
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      # Update image tags in dev GitOps manifest
      # CI already pushed images with this SHA to Artifact Registry
      - name: Update dev image tags
        run: |
          sed -i "s|${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY_ID }}/${{ env.BACKEND_IMAGE }}:.*|${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY_ID }}/${{ env.BACKEND_IMAGE }}:${{ steps.sha.outputs.sha }}|g" \
            gitops/dev/docker-compose.yml

          sed -i "s|${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY_ID }}/${{ env.FRONTEND_IMAGE }}:.*|${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY_ID }}/${{ env.FRONTEND_IMAGE }}:${{ steps.sha.outputs.sha }}|g" \
            gitops/dev/docker-compose.yml

      # Commit and push updated manifest back to git
      # This keeps git as the single source of truth for what is deployed
      - name: Commit and push updated manifests
        run: |
          git config user.email "github-actions@cloudopshub.com"
          git config user.name  "GitHub Actions"
          git add gitops/dev/docker-compose.yml
          git diff --staged --quiet || \
            git commit -m "cd: update dev image tags to ${{ steps.sha.outputs.sha }} [skip ci]"
          git push

  # ── JOB 3: Deploy to Dev VM ─────────────────────────────────────
  deploy:
    name: Deploy to Dev VM
    runs-on: ubuntu-latest
    needs: update-gitops

    permissions:
      contents: read
      id-token: write

    steps:
      # Authenticate to GCP
      # Uses Workload Identity Federation — no static keys
      # Docs: https://github.com/google-github-actions/auth
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ secrets.GCP_SA_EMAIL }}

      # Setup gcloud CLI
      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      # SSH into VM via Cloud IAP and deploy
      #
      # What this does:
      # 1. Pulls latest code (including the updated docker compose.yml we just committed)
      # 2. Authenticates Docker to pull from GCP Artifact Registry
      # 3. Pulls the new images
      # 4. Restarts containers with new images (zero-downtime for unchanged containers)
      #
      # VM has no public IP — access only via Cloud IAP
      # COS filesystem: /mnt/stateful_partition persists across reboots
      # docker compose installed to /var/bin by startup script
      # Docs: https://cloud.google.com/iap/docs/using-tcp-forwarding
      - name: Deploy via IAP SSH
        run: |
          gcloud compute ssh ${{ env.VM_NAME }} \
            --zone=${{ env.VM_ZONE }} \
            --project=${{ env.PROJECT_ID }} \
            --tunnel-through-iap \
            --command="
              set -e
              export PATH=/usr/bin:/bin:\$PATH
              REPO=/mnt/stateful_partition/cloudopshub
              COMPOSE_IMAGE=docker/compose:1.29.2
              PROJECT=${{ env.PROJECT_ID }}
              ENV=dev

              echo '=== Step 1: Clone or pull latest code ==='
              sudo mkdir -p \$REPO
              sudo chown -R \$(whoami):\$(whoami) \$REPO
              if [ -d \$REPO/.git ]; then
                git -C \$REPO pull origin main
              else
                git clone https://github.com/glare247/theepicbook.git \$REPO
              fi

              echo '=== Step 1b: Recreate .env from Secret Manager ==='
              TOKEN=\$(curl -sf -H 'Metadata-Flavor: Google' \
                'http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/token' \
                | grep -o '"access_token":"[^"]*"' | cut -d'\"' -f4)

              fetch_secret() {
                curl -sf -H \"Authorization: Bearer \$TOKEN\" \
                  \"https://secretmanager.googleapis.com/v1/projects/\$PROJECT/secrets/\${1}/versions/latest:access\" \
                  | grep -o '\"data\":\"[^\"]*\"' | cut -d'\"' -f4 | base64 -d
              }

              DB_HOST=\$(fetch_secret \"\${ENV}-db-host\")
              DB_PASSWORD=\$(fetch_secret \"\${ENV}-db-password\")
              SLACK_WEBHOOK_URL=\$(fetch_secret \"\${ENV}-slack-webhook-url\" || echo '')
              ALERTMANAGER_EMAIL_TO=\$(fetch_secret \"\${ENV}-alert-email-to\" || echo '')
              ALERTMANAGER_EMAIL_FROM=\$(fetch_secret \"\${ENV}-alert-email-from\" || echo 'alerts@cloudopshub.com')
              ALERTMANAGER_SMTP_HOST=\$(fetch_secret \"\${ENV}-alert-smtp-host\" || echo 'smtp.gmail.com:587')
              ALERTMANAGER_SMTP_USER=\$(fetch_secret \"\${ENV}-alert-smtp-user\" || echo '')
              ALERTMANAGER_SMTP_PASS=\$(fetch_secret \"\${ENV}-alert-smtp-pass\" || echo '')

              {
                echo "DB_HOST=\${DB_HOST}"
                echo "DB_USER=appuser"
                echo "DB_PASSWORD=\${DB_PASSWORD}"
                echo "DB_NAME=bookstore"
                echo "SLACK_WEBHOOK_URL=\${SLACK_WEBHOOK_URL}"
                echo "ALERTMANAGER_EMAIL_TO=\${ALERTMANAGER_EMAIL_TO}"
                echo "ALERTMANAGER_EMAIL_FROM=\${ALERTMANAGER_EMAIL_FROM}"
                echo "ALERTMANAGER_SMTP_HOST=\${ALERTMANAGER_SMTP_HOST}"
                echo "ALERTMANAGER_SMTP_USER=\${ALERTMANAGER_SMTP_USER}"
                echo "ALERTMANAGER_SMTP_PASS=\${ALERTMANAGER_SMTP_PASS}"
              } > \$REPO/gitops/dev/.env
              chmod 600 \$REPO/gitops/dev/.env

              echo '=== Step 2: Authenticate Docker to Artifact Registry ==='
              AR_TOKEN=\$(curl -sf -H 'Metadata-Flavor: Google' \
                'http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/token' \
                | grep -o '"access_token":"[^"]*"' | cut -d'"' -f4)
              echo "\$AR_TOKEN" | sudo docker login -u oauth2accesstoken --password-stdin us-central1-docker.pkg.dev

              echo '=== Step 3: Pull new images ==='
              sudo docker run --rm \
                -v /var/run/docker.sock:/var/run/docker.sock \
                -v /root/.docker:/root/.docker:ro \
                -v \$REPO:\$REPO \
                -w \$REPO/gitops/dev \
                \$COMPOSE_IMAGE \
                -f \$REPO/gitops/dev/docker-compose.yml pull

              echo '=== Step 4: Restart containers ==='
              sudo docker run --rm \
                -v /var/run/docker.sock:/var/run/docker.sock \
                -v /root/.docker:/root/.docker:ro \
                -v \$REPO:\$REPO \
                -w \$REPO/gitops/dev \
                \$COMPOSE_IMAGE \
                -f \$REPO/gitops/dev/docker-compose.yml up -d

              echo '=== Deployment complete ==='
            "

      # Confirm containers are running after deploy
      - name: Verify deployment
        run: |
          gcloud compute ssh ${{ env.VM_NAME }} \
            --zone=${{ env.VM_ZONE }} \
            --project=${{ env.PROJECT_ID }} \
            --tunnel-through-iap \
            --command="
              export PATH=/var/bin:\$PATH
              echo '=== Running containers ==='
              docker ps --filter name=theepicbook --format 'table {{.Names}}\t{{.Status}}'
            "
