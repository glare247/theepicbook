              sudo docker stop theepicbook-node-exporter 2>/dev/null || true
              sudo docker rm   theepicbook-node-exporter 2>/dev/null || true
              sudo docker run -d \
                --name theepicbook-node-exporter \
                --restart unless-stopped \
                --network theepicbook-network \
                -p 9100:9100 \
