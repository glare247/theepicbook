              DOCKER_CONFIG=/mnt/stateful_partition/.docker
              PROJECT=${{ env.PROJECT_ID }}
              ENV=staging
              SHA=${{ github.event.inputs.image_tag || 'latest' }}

              echo '=== Step 1: Clone or pull latest code ==='
              sudo mkdir -p \$REPO
              sudo chown -R \$(whoami):\$(whoami) \$REPO
              if [ -d \$REPO/.git ]; then
                git -C \$REPO pull origin main
              else
                git clone https://github.com/glare247/theepicbook.git \$REPO
              fi

              echo '=== Step 1b: Fetch secrets from Secret Manager ==='
              TOKEN=\$(curl -sf -H 'Metadata-Flavor: Google' \
                'http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/token' \
                | grep -o '\"access_token\":\"[^\"]*\"' | cut -d'\"' -f4)

              fetch_secret() {
                curl -sf -H \"Authorization: Bearer \$TOKEN\" \
                  \"https://secretmanager.googleapis.com/v1/projects/\$PROJECT/secrets/\${1}/versions/latest:access\" \
                  | grep -o '\"data\":\"[^\"]*\"' | cut -d'\"' -f4 | base64 -d
              }

              DB_HOST=\$(fetch_secret \"\${ENV}-db-host\")
              DB_PASSWORD=\$(fetch_secret \"\${ENV}-db-password\")
              GRAFANA_ADMIN_PASS=\$(fetch_secret \"\${ENV}-grafana-admin-password\" || echo 'changeme')
              SLACK_WEBHOOK_URL=\$(fetch_secret \"\${ENV}-slack-webhook-url\" || echo '')
              ALERTMANAGER_EMAIL_TO=\$(fetch_secret \"\${ENV}-alert-email-to\" || echo '')
              ALERTMANAGER_EMAIL_FROM=\$(fetch_secret \"\${ENV}-alert-email-from\" || echo 'alerts@cloudopshub.com')
              ALERTMANAGER_SMTP_HOST=\$(fetch_secret \"\${ENV}-alert-smtp-host\" || echo 'smtp.gmail.com:587')
              ALERTMANAGER_SMTP_USER=\$(fetch_secret \"\${ENV}-alert-smtp-user\" || echo '')
              ALERTMANAGER_SMTP_PASS=\$(fetch_secret \"\${ENV}-alert-smtp-pass\" || echo '')

              {
                echo \"DB_HOST=\${DB_HOST}\"
                echo \"DB_USER=appuser\"
                echo \"DB_PASSWORD=\${DB_PASSWORD}\"
                echo \"DB_NAME=bookstore\"
                echo \"SLACK_WEBHOOK_URL=\${SLACK_WEBHOOK_URL}\"
                echo \"ALERTMANAGER_EMAIL_TO=\${ALERTMANAGER_EMAIL_TO}\"
                echo \"ALERTMANAGER_EMAIL_FROM=\${ALERTMANAGER_EMAIL_FROM}\"
                echo \"ALERTMANAGER_SMTP_HOST=\${ALERTMANAGER_SMTP_HOST}\"
                echo \"ALERTMANAGER_SMTP_USER=\${ALERTMANAGER_SMTP_USER}\"
                echo \"ALERTMANAGER_SMTP_PASS=\${ALERTMANAGER_SMTP_PASS}\"
              } > \$REPO/gitops/staging/.env
              chmod 600 \$REPO/gitops/staging/.env

              echo '=== Step 2: Authenticate Docker to Artifact Registry ==='
              sudo mkdir -p \$DOCKER_CONFIG
              AR_TOKEN=\$(curl -sf -H 'Metadata-Flavor: Google' \
                'http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/token' \
                | grep -o '\"access_token\":\"[^\"]*\"' | cut -d'\"' -f4)
              echo \$AR_TOKEN | sudo docker --config \$DOCKER_CONFIG login -u oauth2accesstoken --password-stdin us-central1-docker.pkg.dev

              REGISTRY=us-central1-docker.pkg.dev/\$PROJECT/${{ env.REPOSITORY_ID }}

              echo '=== Step 3: Pull images ==='
              sudo docker --config \$DOCKER_CONFIG pull \$REGISTRY/${{ env.BACKEND_IMAGE }}:\$SHA
              sudo docker --config \$DOCKER_CONFIG pull \$REGISTRY/${{ env.FRONTEND_IMAGE }}:\$SHA

              echo '=== Step 4: Ensure network exists ==='
              sudo docker network inspect theepicbook-network >/dev/null 2>&1 || \
                sudo docker network create theepicbook-network

              echo '=== Step 5: Deploy app ==='
              sudo docker stop theepicbook-app 2>/dev/null || true
              sudo docker rm   theepicbook-app 2>/dev/null || true
              sudo docker run -d \
                --name theepicbook-app \
                --restart unless-stopped \
                --network theepicbook-network \
                --env-file \$REPO/gitops/staging/.env \
                -e PORT=8080 \
                -e NODE_ENV=production \
                --log-driver gcplogs \
                --log-opt gcp-log-cmd=true \
                \$REGISTRY/${{ env.BACKEND_IMAGE }}:\$SHA

              echo '=== Step 6: Deploy nginx ==='
              sudo docker stop theepicbook-nginx 2>/dev/null || true
              sudo docker rm   theepicbook-nginx 2>/dev/null || true
              sudo docker run -d \
