
# ─────────────────────────────────────────────────────────────────
# CD PIPELINE — GitHub Actions
#
# Official docs:
# https://docs.github.com/en/actions
# https://docs.portainer.io/api/docs
#
# Triggers after CI pipeline completes successfully
#
# Pipeline stages:
# 1. Check CI       — only proceed if CI passed
# 2. Update GitOps  — update image tags in gitops/ manifests
# 3. Commit + Push  — push updated manifests to repo
# 4. Bootstrap      — ensure Portainer is running on the VM
# 5. GitOps Sync    — Portainer polls Git and redeploys automatically
#
# GitOps flow:
# CI pushes images → CD updates gitops/dev/docker-compose.yml
# → Portainer polls Git every 60s → detects change
# → pulls new images → redeploys app stack
#
# After first bootstrap, SSH is only needed to start Portainer.
# Portainer handles all subsequent deployments automatically.
# ─────────────────────────────────────────────────────────────────

name: CD Pipeline

on:
  # Runs after CI pipeline completes successfully
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
    branches:
      - main

env:
  PROJECT_ID:    expandox-project-2
  REGION:        us-central1
  REPOSITORY_ID: cloudopshub
  VM_NAME:       dev-app-vm
  VM_ZONE:       us-central1-a

  # Image names
  BACKEND_IMAGE:  theepicbook-backend
  FRONTEND_IMAGE: theepicbook-frontend

  # Portainer config
  PORTAINER_URL:        http://localhost:9000
  PORTAINER_STACK_NAME: theepicbook-dev

jobs:

  # ── JOB 1: Only run if CI passed ────────────────────────────────
  check-ci:
    name: Check CI Status
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: CI passed — proceeding with CD
        run: echo "CI pipeline passed — starting CD pipeline"

  # ── JOB 2: Update GitOps Manifests ──────────────────────────────
  update-gitops:
    name: Update GitOps Manifests
    runs-on: ubuntu-latest
    needs: check-ci

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Need full git history to push changes
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # Get the commit SHA from the CI pipeline run
      - name: Get commit SHA
        id: sha
        run: |
          echo "sha=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_OUTPUT
          echo "short_sha=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      # Update image tags in dev GitOps manifest
      # CI already pushed images with this SHA
      # Portainer polls this file from Git every 60s
      # Docs: https://docs.portainer.io/user/docker/stacks/add#git-repository
      - name: Update dev image tags
        run: |
          # Update backend image tag
          sed -i "s|${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY_ID }}/${{ env.BACKEND_IMAGE }}:.*|${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY_ID }}/${{ env.BACKEND_IMAGE }}:${{ steps.sha.outputs.sha }}|g" \
            gitops/dev/docker-compose.yml

          # Update frontend image tag
          sed -i "s|${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY_ID }}/${{ env.FRONTEND_IMAGE }}:.*|${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY_ID }}/${{ env.FRONTEND_IMAGE }}:${{ steps.sha.outputs.sha }}|g" \
            gitops/dev/docker-compose.yml

      # Commit and push updated manifest
      # Portainer detects this commit → redeploys the stack
      - name: Commit and push updated manifests
        run: |
          git config user.email "github-actions@cloudopshub.com"
          git config user.name  "GitHub Actions"
          git add gitops/dev/docker-compose.yml
          git diff --staged --quiet || \
            git commit -m "cd: update dev image tags to ${{ steps.sha.outputs.sha }}"
          git push

  # ── JOB 3: Bootstrap Portainer on VM ────────────────────────────
  bootstrap-portainer:
    name: Bootstrap Portainer
    runs-on: ubuntu-latest
    needs: update-gitops

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Authenticate to GCP
      # Uses Workload Identity Federation — no static keys
      # Docs: https://github.com/google-github-actions/auth
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ secrets.GCP_SA_EMAIL }}

      # Setup gcloud CLI
      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      # SSH into VM via Cloud IAP and bootstrap Portainer
      #
      # What this does:
      # 1. Clones repo on first boot (or pulls latest)
      # 2. Starts Portainer if not already running
      # 3. Waits for Portainer API to be ready
      # 4. Creates admin user on first boot (idempotent)
      # 5. Gets auth token
      # 6. Checks if Git stack already exists
      # 7. Creates stack (first run) or updates it (subsequent runs)
      #
      # Portainer Git stack config:
      # - Repo: https://github.com/glare247/theepicbook
      # - Compose path: gitops/dev/docker-compose.yml
      # - Auto-update: every 60 seconds
      #
      # VM has no public IP — access only via Cloud IAP
      # COS filesystem: /mnt/stateful_partition persists across reboots
      # docker-compose installed to /var/bin by startup script
      # Docs: https://cloud.google.com/iap/docs/using-tcp-forwarding
      - name: Bootstrap Portainer via IAP SSH
        run: |
          gcloud compute ssh ${{ env.VM_NAME }} \
            --zone=${{ env.VM_ZONE }} \
            --project=${{ env.PROJECT_ID }} \
            --tunnel-through-iap \
            --command="
              set -e
              export PATH=/var/bin:\$PATH
              REPO=/mnt/stateful_partition/cloudopshub

              echo '=== Step 1: Clone or update repo ==='
              if [ ! -d \$REPO/.git ]; then
                git clone https://github.com/glare247/theepicbook.git \$REPO
              else
                git -C \$REPO pull origin main
              fi

              echo '=== Step 2: Start Portainer (idempotent) ==='
              docker-compose -f \$REPO/gitops/dev/portainer.yml up -d

              echo '=== Step 3: Wait for Portainer API ==='
              for i in \$(seq 1 12); do
                if curl -sf http://localhost:9000/api/status > /dev/null 2>&1; then
                  echo 'Portainer API is ready'
                  break
                fi
                echo \"Attempt \${i}/12: Portainer not ready yet, waiting 5s...\"
                sleep 5
              done

              echo '=== Step 4: Create admin user (first boot only) ==='
              # Returns 409 if user already exists — that is expected and safe
              curl -sf -X POST http://localhost:9000/api/users/admin/init \
                -H 'Content-Type: application/json' \
                -d '{\"Username\":\"admin\",\"Password\":\"${{ secrets.PORTAINER_ADMIN_PASSWORD }}\"}' \
                || true

              echo '=== Step 5: Get auth token ==='
              TOKEN=\$(curl -sf -X POST http://localhost:9000/api/auth \
                -H 'Content-Type: application/json' \
                -d '{\"username\":\"admin\",\"password\":\"${{ secrets.PORTAINER_ADMIN_PASSWORD }}\"}' \
                | grep -o '\"jwt\":\"[^\"]*\"' | cut -d'\"' -f4)

              if [ -z \"\$TOKEN\" ]; then
                echo 'ERROR: Failed to get Portainer auth token'
                exit 1
              fi
              echo 'Auth token obtained'

              echo '=== Step 6: Get local endpoint ID ==='
              ENDPOINT_ID=\$(curl -sf http://localhost:9000/api/endpoints \
                -H \"Authorization: Bearer \$TOKEN\" \
                | grep -o '\"Id\":[0-9]*' | head -1 | cut -d':' -f2)
              ENDPOINT_ID=\${ENDPOINT_ID:-1}
              echo \"Endpoint ID: \$ENDPOINT_ID\"

              echo '=== Step 7: Check if Git stack exists ==='
              STACK_ID=\$(curl -sf http://localhost:9000/api/stacks \
                -H \"Authorization: Bearer \$TOKEN\" \
                | grep -o '\"Id\":[0-9]*,\"Name\":\"${{ env.PORTAINER_STACK_NAME }}\"' \
                | grep -o '\"Id\":[0-9]*' | cut -d':' -f2)

              if [ -z \"\$STACK_ID\" ]; then
                echo '=== Step 8a: Create Git stack (first run) ==='
                curl -sf -X POST \
                  \"http://localhost:9000/api/stacks/create/standalone/repository?endpointId=\$ENDPOINT_ID\" \
                  -H \"Authorization: Bearer \$TOKEN\" \
                  -H 'Content-Type: application/json' \
                  -d '{
                    \"name\": \"${{ env.PORTAINER_STACK_NAME }}\",
                    \"repositoryURL\": \"https://github.com/glare247/theepicbook\",
                    \"repositoryReferenceName\": \"refs/heads/main\",
                    \"composeFile\": \"gitops/dev/docker-compose.yml\",
                    \"autoUpdate\": {
                      \"interval\": \"1m\"
                    },
                    \"env\": []
                  }'
                echo 'Git stack created — Portainer will poll Git every 60s'
              else
                echo \"=== Step 8b: Force redeploy existing stack (ID: \$STACK_ID) ===\"
                curl -sf -X PUT \
                  \"http://localhost:9000/api/stacks/\$STACK_ID/git/redeploy?endpointId=\$ENDPOINT_ID\" \
                  -H \"Authorization: Bearer \$TOKEN\" \
                  -H 'Content-Type: application/json' \
                  -d '{\"pullImage\": true}'
                echo 'Stack redeployed from latest Git commit'
              fi

              echo '=== Portainer bootstrap complete ==='
            "

      # Verify Portainer and app stack are running
      - name: Verify deployment
        run: |
          gcloud compute ssh ${{ env.VM_NAME }} \
            --zone=${{ env.VM_ZONE }} \
            --project=${{ env.PROJECT_ID }} \
            --tunnel-through-iap \
            --command="
              export PATH=/var/bin:\$PATH
              echo '=== Portainer status ==='
              docker ps --filter name=theepicbook-portainer --format 'table {{.Names}}\t{{.Status}}'
              echo ''
              echo '=== App stack status ==='
              docker ps --filter name=theepicbook --format 'table {{.Names}}\t{{.Status}}'
            "
