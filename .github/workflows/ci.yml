
# ─────────────────────────────────────────────────────────────────
# CI PIPELINE — GitHub Actions
#
# Official docs:
# https://docs.github.com/en/actions
#
# Triggers on every push to main branch
#
# Pipeline stages:
# 1. Security scans   — Snyk, SonarQube, Gitleaks, Hadolint
# 2. Docker build     — builds frontend + backend + mysql images
# 3. Trivy scan       — scans built images for CVEs
# 4. Push to registry — pushes to GCP Artifact Registry
# 5. Checkov scan     — scans Terraform IaC
# 6. Update GitOps    — updates image tags in gitops/ manifests
#
# If ANY stage fails → pipeline stops → nothing reaches production
# ─────────────────────────────────────────────────────────────────

name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  # GCP Configuration
  PROJECT_ID:    expandox-project-2
  REGION:        us-central1
  REPOSITORY_ID: cloudopshub

  # Image names — match architecture diagram
  BACKEND_IMAGE:  theepicbook-backend
  FRONTEND_IMAGE: theepicbook-frontend

jobs:

  # ── JOB 1: Security Scans ───────────────────────────────────────
  security-scans:
    name: Security Scans
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      # fetch-depth: 0 gives Gitleaks the full git history so it can diff
      # the pushed commit range. Shallow clones (depth=1) cause "unknown revision" errors.
      # Docs: https://github.com/actions/checkout
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Gitleaks — scan for secrets in code
      # Blocks passwords, tokens, keys from entering Git
      # Docs: https://github.com/gitleaks/gitleaks-action
      - name: Gitleaks — secrets detection
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Snyk — scan dependencies for vulnerabilities
      # continue-on-error: true so known unfixable high-severity deps
      # (e.g. lodash) don't permanently block deployment
      # Docs: https://github.com/snyk/actions
      - name: Snyk — dependency vulnerability scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      # Hadolint — lint all Dockerfiles
      # Docs: https://github.com/hadolint/hadolint-action
      - name: Hadolint — lint app Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/app/Dockerfile

      - name: Hadolint — lint nginx Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/nginx/Dockerfile

      - name: Hadolint — lint mysql Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/mysql/Dockerfile

      # SonarQube — code quality scan
      # continue-on-error: true so a quality gate doesn't permanently
      # block deployment — findings are still visible in SonarQube UI
      # Docs: https://github.com/SonarSource/sonarqube-scan-action
      - name: SonarQube — code quality scan
        uses: SonarSource/sonarqube-scan-action@master
        continue-on-error: true
        env:
          SONAR_TOKEN:    ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ── JOB 2: Build, Scan and Push Images ──────────────────────────
  build-and-push:
    name: Build Scan and Push
    runs-on: ubuntu-latest
    needs: security-scans

    # Required for Workload Identity Federation
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Authenticate to GCP using Workload Identity
      # No JSON key file needed — uses OIDC token
      # Docs: https://github.com/google-github-actions/auth
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ secrets.GCP_SA_EMAIL }}

      # Setup gcloud CLI
      # Docs: https://github.com/google-github-actions/setup-gcloud
      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      # Configure Docker to use Artifact Registry
      # Docs: https://cloud.google.com/artifact-registry/docs/docker/authentication
      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker \
            ${{ env.REGION }}-docker.pkg.dev --quiet

      # Build backend image
      - name: Build backend image
        run: |
          docker build \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY_ID }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY_ID }}/${{ env.BACKEND_IMAGE }}:latest \
            -f docker/app/Dockerfile .

      # Build frontend image
      - name: Build frontend image
        run: |
          docker build \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY_ID }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY_ID }}/${{ env.FRONTEND_IMAGE }}:latest \
            -f docker/nginx/Dockerfile docker/nginx/

      # Trivy — scan backend image for CVEs
      # ignore-unfixed: true — only fail on CVEs that have an available fix.
      # Without this, alpine base CVEs with no patch block CI indefinitely.
      # Docs: https://github.com/aquasecurity/trivy-action
      - name: Trivy — scan backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:      ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY_ID }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          format:         table
          exit-code:      1
          severity:       CRITICAL
          ignore-unfixed: true

      # Trivy — scan frontend image
      - name: Trivy — scan frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:      ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY_ID }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          format:         table
          exit-code:      1
          severity:       CRITICAL
          ignore-unfixed: true

      # Push backend image to Artifact Registry
      - name: Push backend image
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY_ID }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY_ID }}/${{ env.BACKEND_IMAGE }}:latest

      # Push frontend image
      - name: Push frontend image
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY_ID }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY_ID }}/${{ env.FRONTEND_IMAGE }}:latest


  # ── JOB 3: Terraform Security Scan ──────────────────────────────
  terraform-scan:
    name: Terraform Security Scan
    runs-on: ubuntu-latest
    needs: security-scans

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Checkov — scan Terraform for misconfigurations
      # Docs: https://github.com/bridgecrewio/checkov-action
      - name: Checkov — Terraform IaC scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory:  terraform/
          framework:  terraform
          soft_fail:  true

      # TFSec — additional Terraform security analysis
      # Docs: https://github.com/aquasecurity/tfsec-action
      - name: TFSec — Terraform security scan
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: terraform/
          soft_fail: true

  # ── JOB 4: Deploy to Dev VM ─────────────────────────────────────
  # Runs after images are built and pushed.
  # Updates GitOps manifest then SSHes into GCP VM to deploy.
  deploy:
    name: Deploy to Dev VM
    runs-on: ubuntu-latest
    needs: [build-and-push, terraform-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: write
      id-token: write

    env:
      PROJECT_ID:    expandox-project-2
      REGION:        us-central1
      REPOSITORY_ID: cloudopshub
      VM_NAME:       dev-app-vm
      VM_ZONE:       us-central1-a
      BACKEND_IMAGE: theepicbook-backend
      FRONTEND_IMAGE: theepicbook-frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Update dev image tags
        run: |
          sed -i "s|${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY_ID }}/${{ env.BACKEND_IMAGE }}:.*|${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY_ID }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}|g" \
            gitops/dev/docker-compose.yml
          sed -i "s|${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY_ID }}/${{ env.FRONTEND_IMAGE }}:.*|${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY_ID }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}|g" \
            gitops/dev/docker-compose.yml

      - name: Commit and push updated manifests
        run: |
          git config user.email "github-actions@cloudopshub.com"
          git config user.name  "GitHub Actions"
          git add gitops/dev/docker-compose.yml
          git diff --staged --quiet || \
            git commit -m "cd: update dev image tags to ${{ github.sha }} [skip ci]"
          git pull --rebase origin main
          git push

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ secrets.GCP_SA_EMAIL }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy via IAP SSH
        run: |
          gcloud compute ssh ${{ env.VM_NAME }} \
            --zone=${{ env.VM_ZONE }} \
            --project=${{ env.PROJECT_ID }} \
            --tunnel-through-iap \
            --command="
              set -e
              export PATH=/usr/bin:/bin:\$PATH
              REPO=/mnt/stateful_partition/cloudopshub
              COMPOSE_IMAGE=docker/compose:1.29.2
              PROJECT=${{ env.PROJECT_ID }}
              ENV=dev

              echo '=== Step 1: Clone or pull latest code ==='
              sudo mkdir -p \$REPO
              sudo chown -R \$(whoami):\$(whoami) \$REPO
              if [ -d \$REPO/.git ]; then
                git -C \$REPO pull origin main
              else
                git clone https://github.com/glare247/theepicbook.git \$REPO
              fi

              echo '=== Step 1b: Recreate .env from Secret Manager ==='
              TOKEN=\$(curl -sf -H 'Metadata-Flavor: Google' \
                'http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/token' \
                | grep -o '\"access_token\":\"[^\"]*\"' | cut -d'\"' -f4)

              fetch_secret() {
                curl -sf -H \"Authorization: Bearer \$TOKEN\" \
                  \"https://secretmanager.googleapis.com/v1/projects/\$PROJECT/secrets/\${1}/versions/latest:access\" \
                  | grep -o '\"data\":\"[^\"]*\"' | cut -d'\"' -f4 | base64 -d
              }

              DB_HOST=\$(fetch_secret \"\${ENV}-db-host\")
              DB_PASSWORD=\$(fetch_secret \"\${ENV}-db-password\")
              SLACK_WEBHOOK_URL=\$(fetch_secret \"\${ENV}-slack-webhook-url\" || echo '')
              ALERTMANAGER_EMAIL_TO=\$(fetch_secret \"\${ENV}-alert-email-to\" || echo '')
              ALERTMANAGER_EMAIL_FROM=\$(fetch_secret \"\${ENV}-alert-email-from\" || echo 'alerts@cloudopshub.com')
              ALERTMANAGER_SMTP_HOST=\$(fetch_secret \"\${ENV}-alert-smtp-host\" || echo 'smtp.gmail.com:587')
              ALERTMANAGER_SMTP_USER=\$(fetch_secret \"\${ENV}-alert-smtp-user\" || echo '')
              ALERTMANAGER_SMTP_PASS=\$(fetch_secret \"\${ENV}-alert-smtp-pass\" || echo '')

              {
                echo "DB_HOST=\${DB_HOST}"
                echo "DB_USER=appuser"
                echo "DB_PASSWORD=\${DB_PASSWORD}"
                echo "DB_NAME=bookstore"
                echo "SLACK_WEBHOOK_URL=\${SLACK_WEBHOOK_URL}"
                echo "ALERTMANAGER_EMAIL_TO=\${ALERTMANAGER_EMAIL_TO}"
                echo "ALERTMANAGER_EMAIL_FROM=\${ALERTMANAGER_EMAIL_FROM}"
                echo "ALERTMANAGER_SMTP_HOST=\${ALERTMANAGER_SMTP_HOST}"
                echo "ALERTMANAGER_SMTP_USER=\${ALERTMANAGER_SMTP_USER}"
                echo "ALERTMANAGER_SMTP_PASS=\${ALERTMANAGER_SMTP_PASS}"
              } > \$REPO/gitops/dev/.env
              chmod 600 \$REPO/gitops/dev/.env

              echo '=== Step 2: Authenticate Docker to Artifact Registry ==='
              DOCKER_CONFIG=/mnt/stateful_partition/.docker
              sudo mkdir -p \$DOCKER_CONFIG
              AR_TOKEN=\$(curl -sf -H 'Metadata-Flavor: Google' \
                'http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/token' \
                | grep -o '\"access_token\":\"[^\"]*\"' | cut -d'\"' -f4)
              echo \$AR_TOKEN | sudo docker --config \$DOCKER_CONFIG login -u oauth2accesstoken --password-stdin us-central1-docker.pkg.dev

              echo '=== Step 3: Pull new images ==='
              sudo docker run --rm \
                -v /var/run/docker.sock:/var/run/docker.sock \
                -v \$DOCKER_CONFIG:/root/.docker:ro \
                -v \$REPO:\$REPO \
                -w \$REPO/gitops/dev \
                \$COMPOSE_IMAGE \
                -f \$REPO/gitops/dev/docker-compose.yml pull

              echo '=== Step 4: Restart containers ==='
              sudo docker run --rm \
                -v /var/run/docker.sock:/var/run/docker.sock \
                -v \$DOCKER_CONFIG:/root/.docker:ro \
                -v \$REPO:\$REPO \
                -w \$REPO/gitops/dev \
                \$COMPOSE_IMAGE \
                -f \$REPO/gitops/dev/docker-compose.yml up -d

              echo '=== Deployment complete ==='
            "

      - name: Verify deployment
        run: |
          gcloud compute ssh ${{ env.VM_NAME }} \
            --zone=${{ env.VM_ZONE }} \
            --project=${{ env.PROJECT_ID }} \
            --tunnel-through-iap \
            --command="
              echo '=== Running containers ==='
              docker ps --filter name=theepicbook --format 'table {{.Names}}\t{{.Status}}'
            "
